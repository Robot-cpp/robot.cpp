name: Checks

on:
  push:
  pull_request:

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install checks
        run: python -m pip install pre-commit ruff clang-format

      - name: Run checks
        run: pre-commit run --all-files --show-diff-on-failure
