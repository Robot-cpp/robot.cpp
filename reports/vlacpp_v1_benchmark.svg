<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="940" viewBox="0 0 1400 940" role="img" aria-labelledby="title desc">
    <title id="title">vla.cpp pi-0 LIBERO benchmark comparison</title>
    <desc id="desc">Bar chart comparing vlacpp, OpenPI, LeRobot uncompiled, and LeRobot compiled on success rate and average chunk time for CUDA and CPU.</desc>
    <defs>
        <linearGradient id="prefix__bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#f8fafc" />
            <stop offset="1" stop-color="#eef2ff" />
        </linearGradient>
        <filter id="prefix__shadow" x="-10%" y="-10%" width="120%" height="130%">
            <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.12" />
        </filter>
        <style>
            .prefix__card-title {
                font: 700 24px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                fill: #111827
            }

            .prefix__card-note {
                font: 500 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                fill: #64748b
            }

            .prefix__label {
                font: 600 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                fill: #334155
            }

            .prefix__value {
                font: 700 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                fill: #0f172a
            }

            .prefix__axis {
                font: 500 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                fill: #94a3b8
            }

            .prefix__legend {
                font: 600 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                fill: #334155
            }
        </style>
    </defs>
    <path fill="url(#prefix__bg)" d="M0 0h1400v940H0z" /><text x="60" y="64"
        style="font:700 44px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        fill="#0f172a">vla.cpp pi-0 LIBERO Benchmark</text><text x="60" y="100"
        style="font:400 19px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        fill="#475569">lerobot/pi0 LIBERO comparison on A100-PCIE-40GB and Intel Xeon Platinum 8358P</text>
    <g transform="translate(60 126)">
        <rect y="-13" width="14" height="14" rx="3" fill="#0f766e" /><text x="22" class="prefix__legend">vlacpp</text>
        <rect x="105" y="-13" width="14" height="14" rx="3" fill="#2563eb" /><text x="127"
            class="prefix__legend">OpenPI</text>
        <rect x="220" y="-13" width="14" height="14" rx="3" fill="#d97706" /><text x="242"
            class="prefix__legend">LeRobot uncompiled</text>
        <rect x="420" y="-13" width="14" height="14" rx="3" fill="#7c3aed" /><text x="442"
            class="prefix__legend">LeRobot compiled</text>
    </g>
    <g transform="translate(60 160)" filter="url(#prefix__shadow)">
        <rect width="610" height="330" rx="18" fill="#fff" />
    </g>
    <g transform="translate(60 160)"><text x="28" y="42" class="prefix__card-title">CUDA success rate</text><text x="28"
            y="68" class="prefix__card-note">Higher is better</text>
        <path stroke="#e2e8f0" d="M220 90h320M220 270h320" /><text x="220" y="292" class="prefix__axis">0%</text><text
            x="512" y="292" class="prefix__axis">100%</text><text x="28" y="116" class="prefix__label">vlacpp</text>
        <rect x="220" y="98" width="256" height="28" rx="8" fill="#0f766e" /><text x="490" y="118"
            class="prefix__value">80%</text><text x="28" y="158" class="prefix__label">OpenPI</text>
        <rect x="220" y="140" width="256" height="28" rx="8" fill="#2563eb" /><text x="490" y="160"
            class="prefix__value">80%</text><text x="28" y="200" class="prefix__label">LeRobot uncompiled</text>
        <rect x="220" y="182" width="269" height="28" rx="8" fill="#d97706" /><text x="502" y="202"
            class="prefix__value">84%</text><text x="28" y="242" class="prefix__label">LeRobot compiled</text>
        <rect x="220" y="224" width="250" height="28" rx="8" fill="#7c3aed" /><text x="484" y="244"
            class="prefix__value">78%</text>
    </g>
    <g transform="translate(730 160)" filter="url(#prefix__shadow)">
        <rect width="610" height="330" rx="18" fill="#fff" />
    </g>
    <g transform="translate(730 160)"><text x="28" y="42" class="prefix__card-title">CUDA avg chunk time</text><text
            x="28" y="68" class="prefix__card-note">Lower is better, seconds</text>
        <path stroke="#e2e8f0" d="M220 90h320M220 270h320" /><text x="220" y="292"
            class="prefix__axis">0.00s</text><text x="500" y="292" class="prefix__axis">0.26s</text><text x="28" y="116"
            class="prefix__label">vlacpp</text>
        <rect x="220" y="98" width="182" height="28" rx="8" fill="#0f766e" /><text x="416" y="118"
            class="prefix__value">0.148s</text><text x="28" y="158" class="prefix__label">OpenPI</text>
        <rect x="220" y="140" width="297" height="28" rx="8" fill="#2563eb" /><text x="531" y="160"
            class="prefix__value">0.241s</text><text x="28" y="200" class="prefix__label">LeRobot uncompiled</text>
        <rect x="220" y="182" width="289" height="28" rx="8" fill="#d97706" /><text x="523" y="202"
            class="prefix__value">0.235s</text><text x="28" y="242" class="prefix__label">LeRobot compiled</text>
        <rect x="220" y="224" width="124" height="28" rx="8" fill="#7c3aed" /><text x="358" y="244"
            class="prefix__value">0.101s</text>
    </g>
    <g transform="translate(60 530)" filter="url(#prefix__shadow)">
        <rect width="610" height="330" rx="18" fill="#fff" />
    </g>
    <g transform="translate(60 530)"><text x="28" y="42" class="prefix__card-title">CPU success rate</text><text x="28"
            y="68" class="prefix__card-note">Higher is better</text>
        <path stroke="#e2e8f0" d="M220 90h320M220 270h320" /><text x="220" y="292" class="prefix__axis">0%</text><text
            x="512" y="292" class="prefix__axis">100%</text><text x="28" y="116" class="prefix__label">vlacpp</text>
        <rect x="220" y="98" width="263" height="28" rx="8" fill="#0f766e" /><text x="496" y="118"
            class="prefix__value">82%</text><text x="28" y="158" class="prefix__label">OpenPI</text>
        <rect x="220" y="140" width="256" height="28" rx="8" fill="#2563eb" /><text x="490" y="160"
            class="prefix__value">80%</text><text x="28" y="200" class="prefix__label">LeRobot uncompiled</text>
        <rect x="220" y="182" width="269" height="28" rx="8" fill="#d97706" /><text x="502" y="202"
            class="prefix__value">84%</text><text x="28" y="242" class="prefix__label">LeRobot compiled</text>
        <rect x="220" y="224" width="256" height="28" rx="8" fill="#7c3aed" /><text x="490" y="244"
            class="prefix__value">80%</text>
    </g>
    <g transform="translate(730 530)" filter="url(#prefix__shadow)">
        <rect width="610" height="330" rx="18" fill="#fff" />
    </g>
    <g transform="translate(730 530)"><text x="28" y="42" class="prefix__card-title">CPU avg chunk time</text><text
            x="28" y="68" class="prefix__card-note">Lower is better, seconds</text>
        <path stroke="#e2e8f0" d="M220 90h320M220 270h320" /><text x="220" y="292" class="prefix__axis">0s</text><text
            x="505" y="292" class="prefix__axis">20s</text><text x="28" y="116" class="prefix__label">vlacpp</text>
        <rect x="220" y="98" width="95" height="28" rx="8" fill="#0f766e" /><text x="329" y="118"
            class="prefix__value">5.919s</text><text x="28" y="158" class="prefix__label">OpenPI</text>
        <rect x="220" y="140" width="315" height="28" rx="8" fill="#2563eb" /><text x="549" y="160"
            class="prefix__value">19.66s</text><text x="28" y="200" class="prefix__label">LeRobot uncompiled</text>
        <rect x="220" y="182" width="219" height="28" rx="8" fill="#d97706" /><text x="453" y="202"
            class="prefix__value">13.67s</text><text x="28" y="242" class="prefix__label">LeRobot compiled</text>
        <rect x="220" y="224" width="239" height="28" rx="8" fill="#7c3aed" /><text x="473" y="244"
            class="prefix__value">14.93s</text>
    </g><text x="60" y="900"
        style="font:500 14px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif"
        fill="#64748b">Success is measured on LIBERO-object tasks. Chunk time excludes first compile/warmup chunk where
        applicable.</text>
</svg>
