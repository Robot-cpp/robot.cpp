repos:
  - repo: local
    hooks:
      - id: ruff-fatal
        name: ruff fatal checks
        entry: ruff check --select E9,F63,F7,F82
        language: system
        types_or: [python, pyi]
        exclude: ^third_party/

      - id: clang-format
        name: clang-format
        entry: clang-format --dry-run --Werror
        language: system
        files: ^(src|robot_server|robot_client)/.*\.(c|cc|cpp|cxx|h|hpp)$
